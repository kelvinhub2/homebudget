# HomeBudget — Configuration
# Edit accounts when adding new bank accounts or cards
# DO NOT store passwords or API keys here — use environment variables

app:
  name: "HomeBudget"
  subtitle: "Haushalt Muttenz"
  timezone: "Europe/Zurich"
  hotfolder_poll_seconds: 300   # 5 minutes

