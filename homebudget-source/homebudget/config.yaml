# Internal transfer detection
# Transactions matching these patterns are tagged is_internal=1
# and excluded from expense reports
internal_patterns:
  - "INTERNAL_TRANSFER"
  - "Dauerauftrag"
  - "DA001000"
  - "Your payment - Thank you"   # Swisscard CC settlement

# Known internal recipients (TWINT P2P to own accounts)
internal_recipients:
  - "Schär Manuel"
  - "Manuel Schaer"
  - "Farnaz Sharifi"
  - "Schär & Dr. Sharifi"

# FX annual average rates (CHF per 1 unit of foreign currency)
# Used for Amazon imports only — other sources include FX rate in file
# Update current year rate when available (use January average until year-end)
fx_rates:
  EUR:
    2021: 1.081
    2022: 1.005
    2023: 0.972
    2024: 0.952
    2025: 0.938
    2026: 0.942   # Jan 2026 average — update at year-end
  GBP:
    2021: 1.257
    2022: 1.175
    2023: 1.113
    2024: 1.133
    2025: 1.119
    2026: 1.112   # Jan 2026 average — update at year-end
  USD:
    2021: 0.914
    2022: 0.955
    2023: 0.898
    2024: 0.881
    2025: 0.899
